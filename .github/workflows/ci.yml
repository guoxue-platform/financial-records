name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run init (populate sample data)
        run: |
          cd backend
          python init_sample_data.py

      - name: Verify app loads
        run: |
          cd backend
          python -c "from main import app; print('App loads OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Build Docker image
        run: |
          docker build -t financial-records:latest .

      - name: Verify container runs
        run: |
          docker run -d --name fr-test -p 8000:8000 -e PORT=8000 financial-records:latest
          sleep 5
          curl -f http://localhost:8000/docs || (docker logs fr-test; exit 1)
          docker stop fr-test
